# Sprite sheet manifest for the "neko" pack.
#
# This file ships WITHOUT a PNG image — see README.md in this directory for
# why and for instructions on how to point hyprneko at a sheet you have rights
# to redistribute.
#
# Format reference:
#   image=<png filename>      relative to this directory
#   frame_w=<px>              tile width
#   frame_h=<px>              tile height
#   anim.<name>=<frames>      semicolon-separated col,row pairs
#                             append "; mirror" to mirror horizontally
#
# Frame coordinates are (column, row) into the grid.
#
# Animation names recognized by AnimationResolver (see src/animation/Animation.cpp):
#   idle, sleep, wake, scratch, direction_change
#   run_n, run_ne, run_e, run_se, run_s, run_sw, run_w, run_nw

image=neko.png
frame_w=32
frame_h=32

anim.idle             = 0,0
anim.sleep            = 0,1 ; 1,1
anim.wake             = 2,0
anim.scratch          = 0,2 ; 1,2

anim.run_n            = 0,3 ; 1,3
anim.run_ne           = 0,4 ; 1,4
anim.run_e            = 0,5 ; 1,5
anim.run_se           = 0,6 ; 1,6
anim.run_s            = 0,7 ; 1,7
anim.run_sw           = 0,6 ; 1,6 ; mirror
anim.run_w            = 0,5 ; 1,5 ; mirror
anim.run_nw           = 0,4 ; 1,4 ; mirror
