# aymm configuration. Place this at $XDG_CONFIG_HOME/aymm/aymm.conf
# (or pass --config <path>).

# Sprite pack to use. Currently only "neko" is shipped (without binary assets;
# see assets/sprites/neko/README.md for how to provide your own PNG).
animation_name=neko

# Path to the sprite directory. If empty, aymm draws an orange placeholder
# circle so you can validate the cursor-chase loop without art.
sprite_dir=

# Behavior. Supported: cursor_chase | idle.
behavior=cursor_chase

# Source of the global cursor position. Wayland does not expose this to
# arbitrary clients, so each backend has compositor-specific constraints.
#   hyprland  - polls Hyprland's IPC socket1 (no XWayland; no `hyprctl` fork)
#   wlroots   - reserved (not yet implemented)
#   evdev     - reserved (requires /dev/input access; see docs)
#   null      - never returns a position; pet stays put
cursor_source=hyprland

# Polling rate for the cursor source, in Hz. Connect/read on Hyprland's socket
# is cheap, but values above ~60 mostly waste cycles.
cursor_poll_hz=30

# Movement speed, in pixels per tick.
movement_speed=8

# Distance (px) at which the pet considers it has caught the cursor and
# settles into idle.
idle_distance=24

# Layer for the overlay surface. Supported: background | bottom | top | overlay.
overlay_layer=overlay

# 0.0 means fully transparent background; 1.0 means opaque. Pet sprite is
# unaffected.
overlay_opacity=0.0

# Output to bind to. "auto" lets the compositor pick. Otherwise pass a
# wl_output name (e.g. "DP-1").
monitor=auto

# Square size of the overlay region the pet inhabits, in compositor units.
# v1 ignores this and uses the full monitor; reserved for future windowed mode.
surface_size=256

# Waybar integration toggle. The waybar-status subcommand always works, even
# when this is 0; this flag is reserved for future bar-side hooks.
enable_waybar_status=1

# ---- Pomodoro ----------------------------------------------------------------

enable_pomodoro=0
pomodoro_study_minutes=25
pomodoro_break_minutes=5
pomodoro_long_break_minutes=15
pomodoro_sessions_before_long_break=4
pomodoro_auto_start=0
pomodoro_show_notifications=1
