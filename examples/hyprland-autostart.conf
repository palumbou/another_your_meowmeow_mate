# Snippet for ~/.config/hypr/hyprland.conf
# Append the lines below to your existing config. Keys are evaluated in
# order — `layerrule` lines must come before the `exec-once` so they're
# active when aymm spawns.

# `blur`       — apply Hyprland's background blur to the cat overlay.
# `ignorezero` — clicks fall through fully-transparent pixels (the
#                whole overlay outside the cat shape stays click-through).
layerrule = blur, aymm
layerrule = ignorezero, aymm

# Auto-start the daemon at session login. Add `--pomodoro` here if you
# want every session to begin with a focus run already in progress, or
# `-c <path>` to point at a non-default config.
exec-once = aymm
